    <!-- 自訂提示視窗 (Modal) -->
    <div id="momo-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 opacity-0 pointer-events-none transition-opacity duration-300">

            <h2 class="text-3xl font-black text-gray-800 mb-6 tracking-widest">並沒有</h2>
            <button onclick="closeMomoAlert()" class="w-full bg-[#06C755] hover:bg-green-600 text-white px-6 py-3 rounded-full font-bold text-[16px] transition-colors">
                可惡
            </button>

    <script>
        // Momo Modal 控制
        function showMomoAlert() {
            const modal = document.getElementById('momo-modal');
            const box = document.getElementById('momo-modal-box');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            box.classList.remove('scale-95');
            box.classList.add('scale-100');
        }

        function closeMomoAlert() {
            const modal = document.getElementById('momo-modal');
            const box = document.getElementById('momo-modal-box');
            modal.classList.add('opacity-0', 'pointer-events-none');
            box.classList.remove('scale-100');
            box.classList.add('scale-95');
        }

        // 判斷是否過期或快到期的邏輯
        document.addEventListener('DOMContentLoaded', () => {
            const now = new Date(); // 取得現在時間
            const links = document.querySelectorAll('.coupon-link');

            links.forEach(link => {
                const expireStr = link.getAttribute('data-expire');
                if (!expireStr) return; // 如果沒有設定時間就不檢查

                const expireDate = new Date(expireStr);
                const timeDiff = expireDate - now; // 距離過期的毫秒數
                const hours24 = 24 * 60 * 60 * 1000; // 24小時的毫秒數

                const badge = link.querySelector('.status-badge');
                const arrowIcon = link.querySelector('.arrow-icon');
                
                if (timeDiff <= 0) {
                    // 【已過期】樣式：反灰且移除連結與點擊效果
                    link.classList.add('bg-gray-200', 'opacity-50', 'grayscale', 'shadow-none', 'cursor-not-allowed');
                    link.classList.remove('bg-white', 'hover:border-[#06C755]', 'hover:shadow-md', 'transform', 'hover:-translate-y-1', 'group'); 
                    
                    link.removeAttribute('href');
                    link.addEventListener('click', (e) => { e.preventDefault(); });
                    
                    if (badge) {
                        badge.textContent = "已過期";
                        badge.className = "absolute -top-2.5 -right-2 bg-gray-500 text-white text-[11px] font-bold px-2.5 py-0.5 rounded-full shadow-md z-10 tracking-widest";
                        badge.classList.remove('hidden');
                    }
                    if(arrowIcon) arrowIcon.classList.add('hidden');
                    
                } else if (timeDiff <= hours24) {
                    // 【快到期 (24H內)】樣式
                    link.classList.add('border-red-400', 'shadow-[0_0_12px_rgba(248,113,113,0.25)]');
                    link.classList.remove('border-transparent');
                    
                    if (badge) {
                        badge.innerHTML = `<span class="flex items-center gap-1.5 tracking-wider">即將過期 <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-red-100"></span></span></span>`;
                        badge.className = "absolute -top-2.5 -right-2 bg-red-500 text-white border border-red-600 text-[11px] font-bold px-2.5 py-0.5 rounded-full shadow-md z-10";
                        badge.classList.remove('hidden');
                    }
                }
            });
        });
    </script>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1, maximum-scale=1, viewport-fit=cover">
    <title>LINE Official Account Coupon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* =========================================
           LINE 官方 LDSG 1:1 完美還原 CSS 萬用包
           ========================================= */
        
        /* 1. 全域精準字體設定 (預設系統字體) */
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
            -webkit-font-smoothing: antialiased;
            color: #111111;
        }

        /* 2. 標題列 (Header) 及其容器 */
        .header-container {
            height: 44px;
            max-height: 44px;
            transition: height 0.4s cubic-bezier(0.42, 0, 0.58, 1), max-height 0.4s cubic-bezier(0.42, 0, 0.58, 1);
        }
        .coupon-header-title {
            color: #111111;
            font-size: 17px;
            font-weight: 700;
            line-height: 24px;
            letter-spacing: normal;
        }

        /* 3. 官方帳號資訊區 (OA Info) */
        .oa-name {
            font-size: 13px;
            font-weight: 400;
            line-height: 15.6px;
            color: #3F3F3F;
            margin-right: 8px;
            word-break: break-all;
        }
        .oa-id {
            font-size: 11px;
            font-weight: 400;
            color: #B7B7B7;
            line-height: 12px;
            margin-top: 0px;
        }

        /* 4. 優惠券大標題 (Coupon Title) */
        .coupon-title {
            font-size: 20px;
            font-weight: 700;
            line-height: 26px; /* 1.3 */
            margin-top: 10px;
            margin-bottom: 4px;
            color: #111111;
            overflow-wrap: anywhere;
            word-break: break-all;
        }

        /* 5. 優惠券條件區 (Conditions: 使用條件、有效期間) */
        .condition-title {
            color: #949494;
            font-size: 13px;
            font-weight: 400;
            line-height: 19.5px; /* 1.5 */
            width: 52px;
            min-width: 52px;
            white-space: nowrap;
            flex-shrink: 0;
            padding-top: 1px;
        }
        .condition-content {
            color: #111111;
            font-size: 15px;
            font-weight: 400;
            line-height: 19.5px;
            overflow-wrap: anywhere;
            flex: 1;
        }

        /* 6. 底部使用說明 (Description) */
        .desc-title {
            font-size: 11px;
            font-weight: 400;
            color: #3F3F3F;
            line-height: 18px;
            margin-bottom: 0px;
        }
        .desc-content {
            font-size: 12px;
            color: #3F3F3F;
            line-height: 18px;
            white-space: pre-wrap;
            word-break: break-words;
        }
        .desc-footer {
            font-size: 11px;
            color: #949494;
            line-height: 16.5px;
            margin-top: 2px;
        }

        /* 7. 徽章 (Badge) */
        .badge-available {
            display: flex;
            align-items: center;
            height: 32px;
            padding: 0 10px;
            border: 1px solid #E8E8E8;
            border-radius: 100px;
            background-color: #ffffff;
            color: #949494;
            font-size: 11px;
            font-weight: 700;
            line-height: 16.5px;
            flex-shrink: 0;
        }

        /* 8. 狀態控制與動畫 (互動效果) */
        body.modal-open { overflow: hidden; }
        ::-webkit-scrollbar { display: none; }
        #fade-wrapper { transition: opacity 0.4s ease-in-out; }
        .is-used #fade-wrapper { opacity: 0.35; pointer-events: none; }
    </style>
</head>
<body class="bg-gray-100 selection:bg-green-200">

    <!-- 主容器模擬手機畫面 -->
    <div id="app" class="max-w-md mx-auto bg-white min-h-screen relative shadow-2xl flex flex-col">
        
        <!-- Header -->
        <header class="flex items-center justify-between px-5 py-3.5 bg-white sticky top-0 z-20 border-b border-gray-100">
            <h1 class="text-[19px] font-bold text-black tracking-wide">官方帳號優惠券</h1>
            <button class="w-8 h-8 flex items-center justify-end text-black" aria-label="關閉">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-[26px] h-[26px]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </header>

        <!-- 滾動內容區 -->
        <div class="overflow-y-auto flex-1 pb-28 bg-white">
            
            <!-- 【狀態 3 會淡化的區塊】 -->
            <div id="fade-wrapper">
                <!-- OA Info -->
                <div class="flex items-center justify-between px-5 py-4">
                    <div class="flex items-center space-x-2.5">
                        <img src="https://profile.line-scdn.net/0hhVM8bjA1N3lwQSL-BftILkwEORQHbzExCHd5SFcVaExUI3koTyVwH1EWYRwIdHd7RSYqS1ASbhpZ" alt="老虎歡樂世界-TIGER'S WORLD" class="w-[42px] h-[42px] rounded-full object-cover border border-gray-200">
                        <div class="flex flex-col justify-center">
                            <div class="flex items-center space-x-1">
                                <!-- 灰色星星認證 Icon (1:1 官方精準繪製路徑) -->
                                <svg viewBox="0 0 12 15" class="w-[18px] h-[18px]">
                                    <path fill="#B7B7B7" d="M5.94163 0.892273C3.71349 0.892273 1.90688 1.31396 1.24446 1.49468C1.0638 1.55492 0.943359 1.73565 0.943359 1.91637C0.943359 2.81998 0.943359 5.59107 0.943359 7.21757C0.943359 9.14529 3.47261 11.0128 5.76097 12.1573C5.82119 12.1573 5.88141 12.2176 5.94163 12.2176C6.00185 12.2176 6.06207 12.2176 6.12229 12.1573C8.47088 11.0128 10.9399 9.14529 10.9399 7.21757C10.9399 5.59107 10.9399 2.81998 10.9399 1.91637C10.9399 1.73565 10.8195 1.55492 10.6388 1.49468C9.97638 1.31396 8.16978 0.892273 5.94163 0.892273Z" />
                                    <path fill="#ffffff" d="M5.94175 3.409L6.66233 5.00204L8.28364 5.18946L7.1127 6.40767L7.38291 8.09441L5.94175 7.34475L4.50058 8.09441L4.7708 6.40767L3.59985 5.18946L5.22117 5.00204L5.94175 3.409Z" />
                                </svg>
                                <span class="oa-name">老虎歡樂世界-TIGER'S WORLD</span>
                            </div>
                            <span class="oa-id">@825hsvin</span>
                        </div>
                    </div>
                    <!-- 可使用1張 Badge -->
                    <div class="badge-available">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none"><path fill="#ADADAD" d="M4.41 4.9V3.522h.787V4.9zm0 2.465V5.986h.787v1.379zm0 2.464V8.451h.787v1.378zm0 2.465v-1.379h.787v1.38zm4.796-6.221-.547 1.109-1.224.177.886.863-.21 1.219 1.095-.575 1.095.575-.21-1.219.886-.863-1.224-.177z"></path><path fill="#ADADAD" d="M3.119 3.915v7.986h9.865V3.915zm-.787-.09c0-.385.312-.697.696-.697h10.047c.385 0 .696.312.696.696v8.167a.696.696 0 0 1-.696.696H3.028a.696.696 0 0 1-.696-.696z"></path><path fill="#ADADAD" fill-rule="evenodd" d="M1.304 10.085V2.099h9.866v1.03h.787v-1.12a.696.696 0 0 0-.696-.696H1.214a.696.696 0 0 0-.696.696v8.167c0 .384.311.696.696.696h1.118v-.787z" clip-rule="evenodd"></path></svg>
                        <span class="ml-1">可使用1張</span>
                    </div>
                </div>

                <!-- Coupon Info -->
                <div class="px-5 pb-5">
                    <div class="flex space-x-2">
                        <span class="bg-[#06C755] text-white text-[11px] font-bold px-[6px] py-[2px] rounded-[3px] flex items-center justify-center tracking-normal">其他</span>
                        <span class="bg-[#ff5e1f1a] text-[#ff5e1f] text-[11px] font-bold px-[6px] py-[2px] rounded-[3px] flex items-center justify-center tracking-normal">限單次使用</span>
                    </div>
                    
                    <!-- 套用 CSS 萬用包中的 .coupon-title -->
                    <h1 class="coupon-title">5/1-5/31</h1>
                
                    <div class="space-y-3 mt-4">
                        <div class="flex items-start gap-[12px]">
                            <!-- 套用 CSS 萬用包中的 .condition-title 與 .condition-content -->
                            <span class="condition-title">有效期間</span>
                            <span class="condition-content">至2026/05/31 23:59止</span>
                        </div>
                    </div>
                </div>

                <!-- Coupon Image -->
                <div class="w-full">
                    <img src="https://oa-coupon.line-scdn.net/0hRuYmYjc3DVpkFBLPi_lyDT5KAzgXYAtSB2wQYgVVDTVXdhENHQ00ZQREOg5Nd0hzESA0RwFoMQECRSxNHg0aV0B1OhYVcS8NESJBeRp_JgEOTEkFWQwkbgdvDzBBWDo" class="w-full h-auto object-cover" alt="coupon-image">
                </div>

                <!-- Description -->
                <div class="px-5 py-6">
                    <p class="desc-title">使用說明</p>
                    <div class="desc-content">・使用優惠券時，請向店員出示此畫面。
・已使用的優惠券無法再次使用。此外，若因顧客誤按而變為「已使用」狀態的優惠券也無法再次使用。
・無論是否於有效期間內，本優惠券可能未經預告而變更或結束提供使用。</div>
                    <p class="desc-footer">優惠券上顯示的有效期間，以UTC+08:00的時區為基準。</p>
                </div>
            </div>

            <!-- 【狀態 3 才會顯示的額外按鈕區】 -->
            <div id="extra-buttons" class="hidden flex-col items-center px-5 pb-8 space-y-5 mt-2">
                <button class="flex items-center justify-center space-x-2">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="w-[18px] h-[18px]"><g fill="#06C755"><path d="m11.326 14.412 3.176-3.175 1.06 1.06-4.236 4.237-2.888-2.889 1.06-1.06z"></path><path d="M6.614 3.966A1.76 1.76 0 0 1 7.86 3.45h8.278a1.76 1.76 0 0 1 1.247.517l3.206 3.206a1.76 1.76 0 0 1 .516 1.246v10.368c0 .974-.789 1.763-1.762 1.763H4.655c-.974 0-1.763-.79-1.763-1.763V8.42c0-.467.185-.916.516-1.247zm1.247.984a.26.26 0 0 0-.186.077L4.469 8.233a.26.26 0 0 0-.077.186v10.368c0 .145.117.263.263.263h14.69a.263.263 0 0 0 .264-.263V8.419a.26.26 0 0 0-.078-.186l-3.206-3.206a.26.26 0 0 0-.186-.077z"></path><path d="M20.359 8.75H3.642v-1.5h16.717z"></path></g></svg>
                    <span class="font-bold text-[15px] text-[#111111]">查看我的優惠券</span>
                </button>
                <button class="flex items-center justify-center space-x-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="#06C755" stroke-width="2.5">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <circle cx="12" cy="12" r="2.5"></circle>
                        <path d="M12 8v-2M12 18v-2M8 12H6M18 12h-2"></path>
                    </svg>
                    <span class="font-bold text-[15px] text-[#111111]">尋找附近的優惠券</span>
                </button>
            </div>
        </div>

        <!-- 底部固定按鈕區 -->
        <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white z-10">
            <button id="btn-use" onclick="openConfirmSheet()" class="w-full bg-[#06C755] text-white py-[14px] flex items-center justify-center space-x-1.5 font-bold text-[16px] hover:bg-[#05b34c] transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" height="1.3em" fill="currentColor">
                    <g transform="translate(-2 -2)"><path d="M21 4.4H8.2L7 5.6 5.8 4.4H3c-.55 0-1 .45-1 1v13.2c0 .55.45 1 1 1h2.8L7 18.4l1.2 1.2H21c.55 0 1-.45 1-1V5.4c0-.55-.45-1-1-1ZM6.35 12.65v-1.3h1.3v1.3h-1.3Zm1.3-2.71h-1.3v-1.3h1.3v1.3Zm-1.3 4.12h1.3v1.3h-1.3v-1.2999Z"></path></g>
                </svg>
                <span>使用優惠券</span>
            </button>
            <button id="btn-used" class="hidden w-full bg-[#B7B7B7] text-white py-[14px] items-center justify-center font-bold text-[16px] cursor-not-allowed">
                已使用
            </button>
        </div>

        <div id="globalBackdrop" class="fixed inset-0 bg-black/50 z-40 max-w-md mx-auto opacity-0 pointer-events-none transition-opacity duration-300 ease-in-out" onclick="closeAllSheets()"></div>

        <!-- Confirm Bottom Sheet -->
        <div id="confirmSheet" class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white rounded-t-2xl z-50 overflow-hidden transform translate-y-full transition-transform duration-300 ease-out">
            <div class="flex justify-end p-4">
                <button onclick="closeAllSheets()" class="text-gray-400 hover:text-gray-700 p-1">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div class="flex flex-col items-center justify-center px-5 pb-8 text-center space-y-5">
                
                <div class="space-y-3 pb-5 mt-2">
                    <h3 class="text-[20px] font-bold text-[#111111] tracking-wide">確定要使用優惠券嗎？</h3>
                    <p class="text-[14px] text-[#949494]">本操作無法取消。請先確認操作說明後再使用。</p>
                </div>
                <button onclick="confirmUse()" class="w-full bg-[#ff334b] text-white rounded-[4px] py-[15px] font-bold text-[17px] transition-colors hover:bg-red-600 tracking-wide">
                    使用優惠券
                </button>
            </div>
        </div>

    </div>

    <script>
        const backdrop = document.getElementById('globalBackdrop');
        const confirmSheet = document.getElementById('confirmSheet');
        const appContainer = document.getElementById('app');

        function openConfirmSheet() {
            document.body.classList.add('modal-open');
            backdrop.classList.remove('opacity-0', 'pointer-events-none');
            backdrop.classList.add('opacity-100', 'pointer-events-auto');
            confirmSheet.classList.remove('translate-y-full');
            confirmSheet.classList.add('translate-y-0');
        }

        function closeAllSheets() {
            document.body.classList.remove('modal-open');
            backdrop.classList.add('opacity-0', 'pointer-events-none');
            backdrop.classList.remove('opacity-100', 'pointer-events-auto');
            confirmSheet.classList.add('translate-y-full');
            confirmSheet.classList.remove('translate-y-0');
        }

        function confirmUse() {
            closeAllSheets();
            appContainer.classList.add('is-used');
            document.getElementById('btn-use').classList.add('hidden');
            document.getElementById('btn-used').classList.remove('hidden');
            document.getElementById('btn-used').classList.add('flex');
            const extraBtns = document.getElementById('extra-buttons');
            extraBtns.classList.remove('hidden');
            extraBtns.classList.add('flex');
            setTimeout(() => {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 100);
        }
    </script>
</body>
</html>
